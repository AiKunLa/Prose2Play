services:
  postgres:
    image: postgres:16
    container_name: prose2play-postgres
    environment:
      POSTGRES_DB: prose2play
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prose2play"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - prose2play-postgres-data:/var/lib/postgresql/data

volumes:
  prose2play-postgres-data:
